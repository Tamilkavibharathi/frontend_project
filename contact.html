<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Contact Information</title>
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color:cornsilk;
            padding: 20px;
        }

        h2 {
            font-size: 2rem;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            text-align: center;
        }

        /* Contact Information Section */
        .contact-info {
            background-color: #bdbcbc;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .container {
            text-align: center;
        }

        .contact-details {
            margin-top: 20px;
        }

        .contact-item {
            margin-bottom: 20px;
        }

        .contact-item h3 {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .contact-item p {
            color: #666;
            font-size: 1rem;
        }

        /* Media Query for Smaller Screens */
        @media (max-width: 600px) {
            h2 {
                font-size: 1.5rem;
            }

            .contact-info {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <section class="contact-info">
        <div class="container">
            <h2>Contact Information</h2>
            <p>Show As The Right Path:</p>
            <div class="contact-details">
                <div class="contact-item">
                    <h3>Address:</h3>
                    <p>Government Arts and Science College,
                        Navalurkuttapattu,
                        Srirangam,
                        Tiruchirappalli – 620 027.
                        Tamilnadu, INDIA.</p>
                </div>
                <div class="contact-item">
                    <h3>Phone:</h3>
                    <p>+91 0431 2905029</p>
                </div>
                <div class="contact-item">
                    <h3>Email:</h3>
                    <p>princibui@bdu.ac.in</p>
                </div>
                <div class="contact-item">
                    <h3>Working Hours:</h3>
                    <p>Monday - Friday: 10:00 AM - 3:00 PM</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
